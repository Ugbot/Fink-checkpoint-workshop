version: "3.8"

# Run with: podman-compose up -d
#
# Service map (host-facing ports):
#   Flink ingest UI    http://localhost:18081
#   Flink query UI     http://localhost:18181
#   Flink SQL Gateway  http://localhost:18083   (REST)
#   Query Web UI       http://localhost:3000
#   MinIO console      http://localhost:19001   (workshop / workshopsecret)
#   MinIO S3 API       http://localhost:19000
#   Kafka broker       localhost:19092
#   PostgreSQL         localhost:15432

services:

  kafka:
    image: docker.io/apache/kafka:4.2.0
    container_name: workshop-kafka
    ports:
      - "19092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Two listeners: PLAINTEXT_HOST for jobs running on the host, PLAINTEXT for container-to-container
      KAFKA_LISTENERS: PLAINTEXT_HOST://:9092,PLAINTEXT://:9093,CONTROLLER://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:19092,PLAINTEXT://workshop-kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_HOST:PLAINTEXT,PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9094
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # Single-broker overrides required for Kafka transactions (exactly-once)
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_MAX_TIMEOUT_MS: 3600000
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_NUM_PARTITIONS: 4
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    networks:
      - workshop-net

  postgres:
    image: docker.io/library/postgres:16
    container_name: workshop-postgres
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop
      POSTGRES_DB: workshop
    volumes:
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    networks:
      - workshop-net

  # ────────────────────────────────────────────────────────────────
  # Scenario 06: MinIO (S3-compatible storage for Paimon warehouse)
  # ────────────────────────────────────────────────────────────────
  minio:
    image: docker.io/minio/minio:latest
    container_name: workshop-minio
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: workshop
      MINIO_ROOT_PASSWORD: workshopsecret
    volumes:
      - minio-data:/data
    networks:
      - workshop-net

  # One-shot init container: creates the `paimon` bucket idempotently
  minio-init:
    image: docker.io/minio/mc:latest
    container_name: workshop-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://workshop-minio:9000 workshop workshopsecret >/dev/null 2>&1; do
          echo "waiting for minio..."; sleep 1;
        done
        mc mb -p local/paimon || true
        mc ls local/
        echo "minio init complete"
    networks:
      - workshop-net
    restart: "no"

  # ────────────────────────────────────────────────────────────────
  # Ingest Flink cluster (also used by scenarios 01-05).
  # Built from ./docker/flink-paimon so the same image carries the
  # Paimon connector + S3 plugin used by scenario-06.
  # The image is a strict superset of flink:1.20 — scenarios 01-05
  # keep working unchanged.
  # ────────────────────────────────────────────────────────────────
  flink-jobmanager:
    build:
      context: ./docker/flink-paimon
    image: workshop/flink-paimon:1.20
    container_name: workshop-jobmanager
    command: jobmanager
    ports:
      - "18081:8081"
    environment:
      MINIO_ENDPOINT: http://workshop-minio:9000
      MINIO_ACCESS_KEY: workshop
      MINIO_SECRET_KEY: workshopsecret
      PAIMON_WAREHOUSE: s3a://paimon/warehouse
      KAFKA_BOOTSTRAP: workshop-kafka:9093
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: workshop-jobmanager
        taskmanager.numberOfTaskSlots: 8
        parallelism.default: 2
        state.backend: filesystem
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints
        execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
        s3.endpoint: http://workshop-minio:9000
        s3.access-key: workshop
        s3.secret-key: workshopsecret
        s3.path.style.access: true
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-savepoints:/opt/flink/savepoints
    networks:
      - workshop-net

  flink-taskmanager:
    build:
      context: ./docker/flink-paimon
    image: workshop/flink-paimon:1.20
    container_name: workshop-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      MINIO_ENDPOINT: http://workshop-minio:9000
      MINIO_ACCESS_KEY: workshop
      MINIO_SECRET_KEY: workshopsecret
      PAIMON_WAREHOUSE: s3a://paimon/warehouse
      KAFKA_BOOTSTRAP: workshop-kafka:9093
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: workshop-jobmanager
        taskmanager.numberOfTaskSlots: 8
        s3.endpoint: http://workshop-minio:9000
        s3.access-key: workshop
        s3.secret-key: workshopsecret
        s3.path.style.access: true
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
      - flink-savepoints:/opt/flink/savepoints
    networks:
      - workshop-net

  # ────────────────────────────────────────────────────────────────
  # Scenario 06: dedicated *query* Flink session cluster.
  # Independent of the ingest cluster so ad-hoc scans cannot
  # destabilise the streaming write path.
  # ────────────────────────────────────────────────────────────────
  query-jobmanager:
    build:
      context: ./docker/flink-paimon
    image: workshop/flink-paimon:1.20
    container_name: workshop-query-jobmanager
    command: jobmanager
    depends_on:
      - minio
    ports:
      - "18181:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: workshop-query-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 2
        rest.flamegraph.enabled: true
        s3.endpoint: http://workshop-minio:9000
        s3.access-key: workshop
        s3.secret-key: workshopsecret
        s3.path.style.access: true
    volumes:
      - query-checkpoints:/opt/flink/checkpoints
    networks:
      - workshop-net

  query-taskmanager:
    build:
      context: ./docker/flink-paimon
    image: workshop/flink-paimon:1.20
    container_name: workshop-query-taskmanager
    command: taskmanager
    depends_on:
      - query-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: workshop-query-jobmanager
        taskmanager.numberOfTaskSlots: 4
        s3.endpoint: http://workshop-minio:9000
        s3.access-key: workshop
        s3.secret-key: workshopsecret
        s3.path.style.access: true
    volumes:
      - query-checkpoints:/opt/flink/checkpoints
    networks:
      - workshop-net

  sql-gateway:
    build:
      context: ./docker/flink-paimon
    image: workshop/flink-paimon:1.20
    container_name: workshop-sql-gateway
    depends_on:
      - query-jobmanager
    ports:
      - "18083:8083"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: workshop-query-jobmanager
        rest.address: workshop-query-jobmanager
        rest.port: 8081
        s3.endpoint: http://workshop-minio:9000
        s3.access-key: workshop
        s3.secret-key: workshopsecret
        s3.path.style.access: true
    command:
      - /bin/bash
      - -c
      - |
        /opt/flink/bin/sql-gateway.sh start-foreground \
          -Dsql-gateway.endpoint.type=rest \
          -Dsql-gateway.endpoint.rest.address=0.0.0.0 \
          -Dsql-gateway.endpoint.rest.port=8083
    networks:
      - workshop-net

  query-ui:
    build:
      context: ./docker/query-ui
    image: workshop/query-ui:latest
    container_name: workshop-query-ui
    depends_on:
      - sql-gateway
    ports:
      - "3000:3000"
    environment:
      GATEWAY_URL: http://workshop-sql-gateway:8083
      PORT: "3000"
    networks:
      - workshop-net

volumes:
  postgres-data:
  flink-checkpoints:
  flink-savepoints:
  query-checkpoints:
  minio-data:

networks:
  workshop-net:
    driver: bridge
